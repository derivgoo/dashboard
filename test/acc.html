<script>
let current = 0;
const steps = document.querySelectorAll(".step");

function showStep(n) {
  steps.forEach((step, i) => {
    step.classList.toggle("active", i === n);
  });

  // SAAT MASUK STEP 2, TAMPILKAN EMAIL DARI STEP 1
  if(n === 1) {
    document.getElementById("showEmail").innerText = document.getElementById("email").value;
  }
}

function nextStep() {
  // VALIDASI EMAIL DULU SEBELUM LANJUT
  const email = document.getElementById("email").value.trim();
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  document.getElementById("errEmail").innerText = "";

  if(email === "") {
    document.getElementById("errEmail").innerText = "Email wajib diisi";
    return;
  }
  if(!emailRegex.test(email)) {
    document.getElementById("errEmail").innerText = "Format email tidak valid";
    return;
  }

  current++;
  showStep(current);
}

function prevStep() {
  current--;
  showStep(current);
}

// VALIDASI & SUBMIT STEP 2
document.getElementById("form2Langkah").addEventListener("submit", function(e){
  e.preventDefault();
  const pass = document.getElementById("password").value.trim();
  document.getElementById("errPassword").innerText = "";

  if(pass.length < 6) {
    document.getElementById("errPassword").innerText = "Password minimal 6 karakter";
    return;
  }

  let data = new FormData(this);
  alert("Pendaftaran Berhasil!\nEmail: " + data.get('email') + "\nPassword: " + data.get('password'));
  
  // Kirim ke server
  // fetch('proses.php', {method:'POST', body: data})
});
</script>
